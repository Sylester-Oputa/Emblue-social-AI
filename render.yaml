# Render Blueprint for Emblue Social AI Backend
# This file enables one-click deployment to Render
# Learn more: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service (NestJS API)
  - type: web
    name: emblue-social-ai-backend
    runtime: node
    region: oregon # Change to your preferred region
    plan: free # Options: free, starter, standard, pro
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run db:push && npm run db:seed && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
      - key: DATABASE_URL
        fromDatabase:
          name: emblue-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Auto-generates secure random string
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: MOCK_SOCIAL_APIS
        value: true # Set to false when you have real API keys
      # Optional: Add these manually in Render Dashboard
      # - key: OPENAI_API_KEY
      #   sync: false # Mark as secret
      # - key: FRONTEND_URL
      #   value: https://your-app.vercel.app
      # - key: CORS_ORIGINS
      #   value: https://your-app.vercel.app,http://localhost:3000

databases:
  # PostgreSQL Database
  - name: emblue-db
    databaseName: emblue_db
    user: emblue_user
    region: oregon # Same region as web service
    plan: free # Options: free, starter, standard, pro
    ipAllowList: [] # Empty = accessible from anywhere
